<!DOCTYPE html>
<html>
<head>
  <title>Music Player</title>
  <style>
    body {
  background: linear-gradient(to right, #2c3e50, #3498db);
  font-family: 'Arial', sans-serif;
  color: white;
  text-align: center;
  padding: 50px;
}

.container {
  background: rgba(0, 0, 0, 0.3);
  padding: 30px;
  border-radius: 10px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
}

audio {
  width: 100%;
  margin: 20px 0;
}

  </style>
</head>
